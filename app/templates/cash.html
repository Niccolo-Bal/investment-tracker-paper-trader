{% extends "base.html" %}
{% block title %}Cash · {{ account.name }}{% endblock %}
{% block body_class %}account-theme-paper{% endblock %}

{% block content %}
<header class="account-header">
  <div>
    <div class="account-header__eyebrow">
      <span class="badge badge-paper">paper</span>
      <a href="{{ url_for('pages.account_detail', account_id=account.id) }}">{{ account.name }}</a>
    </div>
    <h1>Cash</h1>
    <p class="muted">Available balance: <strong data-money="{{ account.cash_balance }}"></strong></p>
  </div>
</header>

<section class="section">
  <form class="form-panel" method="post" action="{{ url_for('pages.cash', account_id=account.id) }}">
    <div class="form-grid">
      <div class="form-row">
        <label for="action">Action</label>
        <select id="action" name="action">
          <option value="deposit">Deposit</option>
          <option value="withdraw">Withdraw</option>
        </select>
      </div>
      <div class="form-row">
        <label for="amount">Amount</label>
        <input id="amount" name="amount" type="number" min="0.01" step="0.01" required>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" type="submit">Update cash</button>
        <a class="btn btn-secondary" href="{{ url_for('pages.account_detail', account_id=account.id) }}">Cancel</a>
      </div>
    </div>
  </form>
</section>
{% endblock %}
